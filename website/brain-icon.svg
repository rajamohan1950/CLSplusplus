    <!-- Left folds -->
    <path d="M-6,-20 C-18,-18 -28,-10 -30,-2"/>
    <path d="M-6,-5 C-16,-3 -26,5 -28,14"/>
    <path d="M-6,12 C-14,15 -22,22 -20,28"/>
