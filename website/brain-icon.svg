      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="50%" stop-color="#7c6ef0"/>
      <stop offset="100%" stop-color="#4a3da8"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
