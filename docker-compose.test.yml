# Isolated test stack. Separate ports + volume names so `docker compose -f
# docker-compose.test.yml up` does NOT clash with the dev stack in
# docker-compose.yml. Tests write only to this stack.
#
# Run:   docker compose -f docker-compose.test.yml up -d --build
# Stop:  docker compose -f docker-compose.test.yml down -v
version: "3.8"

services:
  cls-api-test:
    build: .
    ports:
      - "18080:8080"
    environment:
      - CLS_REDIS_URL=redis://redis-test:6379
      - CLS_DATABASE_URL=postgresql://cls:cls@postgres-test:5432/cls_test
      - CLS_CORS_ORIGINS=http://localhost:3000,http://localhost:18080
      - CLS_COOKIE_SECURE=false
      - CLS_REQUIRE_API_KEY=false
      - CLS_TEST_MODE=true
      - CLS_JWT_SECRET=test-jwt-secret-not-for-prod-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    depends_on:
      redis-test:
        condition: service_healthy
      postgres-test:
        condition: service_healthy

  redis-test:
    image: redis:7-alpine
    ports:
      - "16399:6379"
    volumes:
      - redis_test_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 10

  postgres-test:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: cls
      POSTGRES_PASSWORD: cls
      POSTGRES_DB: cls_test
    ports:
      - "15499:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cls -d cls_test"]
      interval: 3s
      timeout: 2s
      retries: 10

volumes:
  redis_test_data:
  postgres_test_data:
