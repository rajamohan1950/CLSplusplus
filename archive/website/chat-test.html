<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CLS++ Chat Test — Cross-LLM Memory Injection</title>
  <link rel="stylesheet" href="styles.css?v=2"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:transparent;color:#1d1d1f;height:100vh;display:flex;flex-direction:column}
    .header{padding:12px 20px;border-bottom:1px solid rgba(0,0,0,0.08);background:rgba(255,255,255,0.92);margin-top:56px;display:flex;align-items:center;gap:10px}
    .header h1{font-size:15px;font-weight:600}
    .status{font-size:11px;padding:3px 8px;border-radius:10px;background:rgba(22,163,74,0.1);color:#16a34a}
    .chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;background:rgba(255,255,255,0.92);position:relative;z-index:1}
    .msg{max-width:80%;padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.5}
    .msg.user{align-self:flex-end;background:#ff6b35;color:#fff;border-bottom-right-radius:4px}
    .msg.assistant{align-self:flex-start;background:rgba(0,0,0,0.03);border:1px solid rgba(0,0,0,0.08);color:#1d1d1f;border-bottom-left-radius:4px}
    .msg .injected{font-size:11px;color:#ff6b35;background:rgba(255,107,53,.06);padding:6px 8px;border-radius:6px;margin-bottom:8px;white-space:pre-wrap;border-left:2px solid #ff6b35}
    .msg .injected-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#ff6b35;margin-bottom:4px}
    .input-bar{padding:12px 20px;border-top:1px solid rgba(0,0,0,0.08);background:rgba(255,255,255,0.92);display:flex;gap:10px}
    .input-bar input{flex:1;padding:10px 14px;background:rgba(0,0,0,0.03);border:1px solid rgba(0,0,0,0.1);border-radius:10px;color:#1d1d1f;font-size:14px;outline:none}
    .input-bar button{padding:10px 20px;background:#ff6b35;border:none;border-radius:10px;color:#fff;font-weight:600;cursor:pointer}
    .log{position:fixed;bottom:0;left:0;right:0;max-height:150px;overflow-y:auto;background:rgba(29,29,31,0.95);border-top:1px solid rgba(0,0,0,0.1);padding:8px;font-family:monospace;font-size:10px;color:#86868b;z-index:100}
    .log .ok{color:#16a34a}
    .log .err{color:#ef4444}
    .log .info{color:#ff6b35}
  </style>
</head>
<body>
<div class="video-bg"><video autoplay muted loop playsinline poster="beach-bg.jpg"><source src="sunrise-ocean.mp4" type="video/mp4"></video></div>
<div class="video-overlay"></div>
<nav class="nav"><div class="nav-inner"><a href="/" class="logo">CLS<span class="logo-plus">++</span></a><div class="nav-links"><a href="/">Home</a><a href="/docs.html">API</a><a href="/integrate.html">Integrate</a><a href="/#pricing">Pricing</a><div id="nav-auth" class="nav-auth"></div><a href="/getting-started.html" class="nav-cta">Get Started</a></div></div></nav>

  <div class="header">
    <h1>CLS++ Chat Test</h1>
    <div class="status" id="status">Checking...</div>
  </div>
  <div class="chat" id="chat"></div>
  <div class="input-bar">
    <input id="input" type="text" placeholder="Ask about Raj, dingu, ruchi, movies..." autofocus/>
    <button id="send">Send</button>
  </div>
  <div class="log" id="log"></div>

<script>
const API = window.location.origin;
const API_KEY = 'cls_live_y1tVT3zjyMftM0xLYoVfCgnt2qDXPOcYsuPcZ1ItJR4';
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const logEl = document.getElementById('log');

function log(msg, cls) {
  const d = document.createElement('div');
  d.className = cls || '';
  d.textContent = new Date().toLocaleTimeString() + ' ' + msg;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
}

function addMsg(role, text, injectedContext) {
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  if (injectedContext && role === 'assistant') {
    d.innerHTML = '<div class="injected"><div class="injected-label">CLS++ Memory Injected</div>' +
      injectedContext.replace(/</g,'&lt;').replace(/\n/g,'<br>') + '</div>' +
      text.replace(/</g,'&lt;').replace(/\n/g,'<br>');
  } else {
    d.textContent = text;
  }
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

// Check server
fetch(API + '/health').then(r => {
  if (r.ok) {
    document.getElementById('status').textContent = 'Connected to ' + API;
    log('Server connected: ' + API, 'ok');
  }
}).catch(() => {
  document.getElementById('status').textContent = 'Server offline';
  log('Server unreachable', 'err');
});

async function sendMessage() {
  const query = input.value.trim();
  if (!query) return;
  input.value = '';
  addMsg('user', query);

  // Step 1: Recall memories
  log('Recalling memories for: "' + query.slice(0,50) + '"...', 'info');
  let context = '';
  try {
    const r = await fetch(API + '/v1/memory/read', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + API_KEY},
      body: JSON.stringify({query: query, limit: 5}),
    });
    const d = await r.json();
    const items = d.items || [];
    log('Memory read: ' + items.length + ' items found', items.length > 0 ? 'ok' : 'err');

    if (items.length > 0) {
      context = 'For context, here are things I mentioned before:\n' +
        'These are confirmed facts about this user from prior conversations across all AI models.\n' +
        'Treat them as ground truth. Answer based on these facts:\n';
      items.forEach(i => {
        context += '- ' + i.text + '\n';
        log('  Memory: ' + i.text.slice(0,80), 'ok');
      });
    }
  } catch(e) {
    log('Memory read failed: ' + e, 'err');
  }

  // Step 2: Store the prompt
  log('Storing prompt to TRG...', 'info');
  try {
    await fetch(API + '/v1/prompts/ingest', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + API_KEY},
      body: JSON.stringify({
        session_id: 'chat-test-' + Date.now().toString(36),
        llm_provider: 'chat-test',
        entries: [{role: 'user', content: query, sequence_num: 0}],
      }),
    });
    log('Prompt stored', 'ok');
  } catch(e) {
    log('Store failed: ' + e, 'err');
  }

  // Step 3: Simulate LLM response (we don't actually call an LLM — just show what was injected)
  if (context) {
    addMsg('assistant',
      'The LLM would receive the above context block prepended to your prompt. ' +
      'Any LLM (ChatGPT, Claude, Gemini, Grok) would see these memories and answer accordingly.',
      context);
    log('Context injection: ' + context.split('\n').length + ' lines', 'ok');
  } else {
    addMsg('assistant', 'No memories found for this query. The LLM would respond without CLS++ context.');
    log('No context to inject', 'err');
  }
}

document.getElementById('send').addEventListener('click', sendMessage);
input.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });
</script>
<script src="footer.js?v=2"></script>
</body>
</html>
