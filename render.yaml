# CLS++ - Use your EXISTING free Postgres + Redis (Render allows only 1 free each)
# Deploy: https://render.com/deploy?repo=https://github.com/rajamohan1950/CLSplusplus
# You'll be prompted for CLS_REDIS_URL and CLS_DATABASE_URL - paste from your existing services

services:
  - type: web
    name: clsplusplus-website
    runtime: static
    buildCommand: "true"
    staticPublishPath: ./website
    routes:
      - type: rewrite
        source: /
        destination: /index.html

  - type: web
    name: clsplusplus-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /v1/memory/health
    envVars:
      - key: CLS_REDIS_URL
        sync: false  # Paste from Dashboard → your Redis → Connection String
      - key: CLS_DATABASE_URL
        sync: false  # Paste from Dashboard → your Postgres → Connection String
      - key: CLS_ANTHROPIC_API_KEY
        sync: false  # For demo: Claude (get from console.anthropic.com)
      - key: CLS_OPENAI_API_KEY
        sync: false  # For demo: OpenAI (get from platform.openai.com)
      - key: CLS_GOOGLE_API_KEY
        sync: false  # For demo: Gemini (get from aistudio.google.com)
