# CLS++ Full Stack - 100% FREE on Render (no credit card)
# Static site + API + Redis + Postgres. L3 uses Postgres (no MinIO/disk).
# Deploy: https://render.com/deploy?repo=https://github.com/rajamohan1950/CLSplusplus

services:
  # Marketing website - FREE
  - type: web
    name: clsplusplus-website
    runtime: static
    buildCommand: "true"
    staticPublishPath: ./website
    plan: free

  # CLS++ API - FREE (750 hrs/mo, spins down after 15 min idle)
  - type: web
    name: clsplusplus-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /v1/memory/health
    envVars:
      - key: CLS_REDIS_URL
        fromService:
          type: keyvalue
          name: clsplusplus-redis
          property: connectionString
      - key: CLS_DATABASE_URL
        fromDatabase:
          name: clsplusplus-db
          property: connectionString

  # Redis - FREE
  - type: keyvalue
    name: clsplusplus-redis
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow-all

databases:
  # Postgres - FREE (expires after 30 days, then recreate)
  - name: clsplusplus-db
    plan: free
    databaseName: cls
