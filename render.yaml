# CLS++ — Cloud-hosted memory server + Chrome extension download
# Deploy: https://render.com/deploy?repo=https://github.com/rajamohan1950/CLSplusplus
services:
  - type: web
    name: clsplusplus
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: CLS_DATABASE_URL
        sync: false
      - key: CLS_REDIS_URL
        sync: false
      - key: CLS_JWT_SECRET
        sync: false
      - key: CLS_TRACK_USAGE
        value: "true"
      - key: CLS_ANTHROPIC_API_KEY
        sync: false
      - key: CLS_OPENAI_API_KEY
        sync: false
      - key: CLS_GOOGLE_API_KEY
        sync: false
      - key: CLS_RAZORPAY_KEY_ID
        sync: false
      - key: CLS_RAZORPAY_KEY_SECRET
        sync: false
      - key: CLS_RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: CLS_GITHUB_CLIENT_ID
        sync: false
      - key: CLS_GITHUB_CLIENT_SECRET
        sync: false
      - key: CLS_GITHUB_REDIRECT_URI
        sync: false
      # Google OAuth — client id/secret were MISSING from the blueprint.
      # Without them "Sign in with Google" is broken.
      - key: CLS_GOOGLE_CLIENT_ID
        sync: false
      - key: CLS_GOOGLE_CLIENT_SECRET
        sync: false
      - key: CLS_GOOGLE_REDIRECT_URI
        sync: false
      # Resend transactional email — REQUIRED for signup. Registration is
      # OTP-based: with no Resend key the verification email never sends
      # and nobody can complete signup.
      - key: CLS_RESEND_API_KEY
        sync: false
      - key: CLS_EMAIL_FROM
        sync: false
      - key: CLS_FRONTEND_URL
        sync: false
      - key: CLS_COOKIE_DOMAIN
        sync: false
      # Sentry error tracking — leave unset to disable. When set, unhandled
      # exceptions are reported with request context.
      - key: CLS_SENTRY_DSN
        sync: false
      # --- Launch-control hardening (see LAUNCH_CHECKLIST.md §2) ---
      # Declared with explicit values so a fresh blueprint deploy is correct
      # by default instead of silently relying on code defaults.
      - key: CLS_REQUIRE_API_KEY
        value: "true"
      - key: CLS_ENFORCE_QUOTAS
        value: "true"
      - key: CLS_QUOTA_FAIL_CLOSED
        value: "true"
      - key: CLS_FREE_CAP_PER_HOUR
        value: "120"
      - key: CLS_FREE_CAP_PER_DAY
        value: "1000"
      - key: CLS_FREE_CAP_PER_WEEK
        value: "4000"
      - key: CLS_FREE_CAP_PER_MONTH
        value: "8000"
      - key: CLS_FREE_LAUNCH_MONTHLY_CAP
        value: "8000"
      - key: CLS_FREE_POSTTRIAL_MONTHLY_CAP
        value: "800"
      - key: CLS_MAX_ACTIVE_USERS
        value: "100"
      - key: CLS_WAITLIST_QUEUE_LIMIT
        value: "500"
      - key: CLS_WAITLIST_PROMOTE_BATCH
        value: "5"
      - key: CLS_GEO_GATING_ENABLED
        value: "true"
      - key: CLS_LAUNCH_COUNTRY
        value: "IN"
      - key: CLS_ABUSE_GUARD_ENABLED
        value: "true"
      - key: CLS_AUTH_RATE_LIMIT_PER_IP
        value: "10"
      - key: CLS_AUTH_RATE_LIMIT_WINDOW_SECONDS
        value: "60"
