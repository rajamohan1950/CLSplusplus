<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d18"/>
    </radialGradient>
    <radialGradient id="brain-top" cx="45%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#f4a0b0"/>
      <stop offset="40%" stop-color="#e87a8a"/>
      <stop offset="100%" stop-color="#c45a6a"/>
    </radialGradient>
    <radialGradient id="brain-shadow" cx="55%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#b04858"/>
      <stop offset="100%" stop-color="#8a2a3a"/>
    </radialGradient>
    <radialGradient id="highlight" cx="35%" cy="25%" r="30%">
      <stop offset="0%" stop-color="#ffd0d8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffd0d8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Dark background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bg)"/>
  <!-- Brain body -->
  <g transform="translate(64,62) scale(0.82)">
    <!-- Left hemisphere base -->
    <path d="M-2,-38 C-12,-40 -26,-38 -34,-28 C-42,-18 -44,-4 -40,8 C-36,20 -28,30 -18,36 C-10,40 -4,40 -2,38Z" fill="url(#brain-shadow)"/>
    <!-- Right hemisphere base -->
    <path d="M2,-38 C12,-40 26,-38 34,-28 C42,-18 44,-4 40,8 C36,20 28,30 18,36 C10,40 4,40 2,38Z" fill="url(#brain-shadow)"/>
    <!-- Left hemisphere top layer -->
    <path d="M-2,-38 C-12,-40 -26,-38 -34,-28 C-42,-18 -44,-4 -40,8 C-36,20 -28,30 -18,36 C-10,40 -4,40 -2,38Z" fill="url(#brain-top)"/>
    <!-- Right hemisphere top layer -->
    <path d="M2,-38 C12,-40 26,-38 34,-28 C42,-18 44,-4 40,8 C36,20 28,30 18,36 C10,40 4,40 2,38Z" fill="url(#brain-top)"/>
    <!-- Highlight -->
    <path d="M-2,-38 C-12,-40 -26,-38 -34,-28 C-42,-18 -44,-4 -40,8 C-36,20 -28,30 -18,36 C-10,40 -4,40 -2,38Z" fill="url(#highlight)"/>
    <path d="M2,-38 C12,-40 26,-38 34,-28 C42,-18 44,-4 40,8 C36,20 28,30 18,36 C10,40 4,40 2,38Z" fill="url(#highlight)"/>
    <!-- Center fissure -->
    <line x1="0" y1="-38" x2="0" y2="38" stroke="#9a3a4a" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Brain folds - left -->
    <path d="M-4,-24 C-16,-22 -30,-14 -34,-4" stroke="#a84858" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M-4,-10 C-14,-8 -28,0 -34,10" stroke="#a84858" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M-4,6 C-12,8 -24,16 -28,24" stroke="#a84858" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M-18,-34 C-24,-28 -30,-20 -32,-12" stroke="#a84858" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <!-- Brain folds - right -->
    <path d="M4,-24 C16,-22 30,-14 34,-4" stroke="#a84858" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M4,-10 C14,-8 28,0 34,10" stroke="#a84858" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M4,6 C12,8 24,16 28,24" stroke="#a84858" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M18,-34 C24,-28 30,-20 32,-12" stroke="#a84858" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <!-- Cerebellum (bottom) -->
    <ellipse cx="-10" cy="34" rx="12" ry="7" fill="#c45a6a"/>
    <ellipse cx="10" cy="34" rx="12" ry="7" fill="#c45a6a"/>
    <path d="M-10,30 L-10,38" stroke="#a84858" stroke-width="1.5"/>
    <path d="M10,30 L10,38" stroke="#a84858" stroke-width="1.5"/>
    <!-- Brain stem -->
    <path d="M-4,38 Q0,46 4,38" stroke="#b04858" stroke-width="2.5" fill="#c45a6a"/>
    <!-- Top highlight spots -->
    <ellipse cx="-14" cy="-22" rx="6" ry="4" fill="rgba(255,220,228,0.25)" transform="rotate(-15,-14,-22)"/>
    <ellipse cx="12" cy="-18" rx="5" ry="3" fill="rgba(255,220,228,0.2)" transform="rotate(10,12,-18)"/>
  </g>
</svg>
