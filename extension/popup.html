<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{width:260px;background:#06060c;color:#f0f0f8;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
      -webkit-font-smoothing:antialiased;padding:20px}
    .logo{display:flex;align-items:center;gap:8px;margin-bottom:16px}
    .dot{width:8px;height:8px;border-radius:50%;background:#5de0c5;
      box-shadow:0 0 7px #5de0c5;animation:blink 1.8s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
    .logo-text{font-size:13px;font-weight:700}
    .count{font-size:36px;font-weight:800;letter-spacing:-.04em;color:#7c6ef0;margin-bottom:2px}
    .count-label{font-size:11px;color:rgba(240,240,248,.45);margin-bottom:16px}
    .toggle{display:flex;align-items:center;justify-content:space-between;
      background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
      border-radius:10px;padding:10px 12px;margin-bottom:10px}
    .toggle-label{font-size:12px;font-weight:600}
    .toggle-sub{font-size:10px;color:rgba(240,240,248,.4);margin-top:2px}
    .switch{position:relative;width:36px;height:20px;flex-shrink:0}
    .switch input{opacity:0;width:0;height:0}
    .slider{position:absolute;inset:0;background:rgba(255,255,255,.15);
      border-radius:20px;cursor:pointer;transition:.2s}
    .slider:before{content:'';position:absolute;width:14px;height:14px;
      left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
    input:checked+.slider{background:#7c6ef0}
    input:checked+.slider:before{transform:translateX(16px)}
    .view-btn{display:block;width:100%;padding:10px;background:rgba(124,110,240,.12);
      border:1px solid rgba(124,110,240,.25);border-radius:10px;color:#a89cf7;
      font-size:12px;font-weight:600;cursor:pointer;text-align:center;
      text-decoration:none;transition:all .18s;margin-top:6px}
    .view-btn:hover{background:rgba(124,110,240,.2)}
    .status{font-size:10px;color:rgba(240,240,248,.3);text-align:center;
      margin-top:12px;display:flex;align-items:center;justify-content:center;gap:5px}
    .status-dot{width:5px;height:5px;border-radius:50%}
  </style>
</head>
<body>
  <div class="logo">
    <div class="dot"></div>
    <span class="logo-text">CLS++ Memory</span>
  </div>

  <div class="count" id="count">0</div>
  <div class="count-label">memories stored</div>

  <div class="toggle">
    <div>
      <div class="toggle-label">Auto-inject</div>
      <div class="toggle-sub">Prepend memories when you send</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="toggle-inject" checked/>
      <span class="slider"></span>
    </label>
  </div>

  <a id="view-btn" class="view-btn" href="https://clsplusplus.onrender.com/ui/memory.html" target="_blank">
    View My Memories →
  </a>

  <div class="status">
    <div class="status-dot" id="status-dot" style="background:#5de0c5"></div>
    <span id="status-text">Connected</span>
  </div>

<script src="popup.js"></script>
</body>
</html>
