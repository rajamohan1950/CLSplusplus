# CLS++ Development Stack (free tier - no MinIO)
# Run: docker compose up -d
# API: http://localhost:8080

version: "3.8"

services:
  cls-api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env  # optional: add for demo LLM keys (CLS_ANTHROPIC_API_KEY, etc.)
    environment:
      - CLS_REDIS_URL=redis://redis:6379
      - CLS_DATABASE_URL=postgresql://cls:cls@postgres:5432/cls
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6399:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: cls
      POSTGRES_PASSWORD: cls
      POSTGRES_DB: cls
    ports:
      - "5499:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cls -d cls"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
  postgres_data:
