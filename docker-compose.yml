# CLS++ Development Stack
# Run: docker compose up -d
# API: http://localhost:8080

version: "3.8"

services:
  cls-api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - CLS_REDIS_URL=redis://redis:6379
      - CLS_DATABASE_URL=postgresql://cls:cls@postgres:5432/cls
      - CLS_MINIO_ENDPOINT=minio:9000
      - CLS_MINIO_ACCESS_KEY=minioadmin
      - CLS_MINIO_SECRET_KEY=minioadmin
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: cls
      POSTGRES_PASSWORD: cls
      POSTGRES_DB: cls
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cls -d cls"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  redis_data:
  postgres_data:
  minio_data:
