<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CLS++ · Memory Manager</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#06060c;--surface:#0d0d18;--surface2:#131325;--surface3:#1a1a2e;
      --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
      --accent:#7c6ef0;--accent2:#5de0c5;--text:#f0f0f8;--muted:rgba(240,240,248,0.42);
      --r:14px;
      /* Model colours */
      --chatgpt:#19c37d;--claude:#cc785c;--gemini:#4285f4;
      --copilot:#2564cf;--perplexity:#20b2aa;--grok:#ff6b35;--haiku:#cc785c;
    }
    html,body{min-height:100%;background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
      -webkit-font-smoothing:antialiased}

    /* ── LAYOUT ─────────────────────────────────────── */
    .layout{display:grid;grid-template-columns:260px 1fr;height:100vh;overflow:hidden}

    /* ── LEFT SIDEBAR ───────────────────────────────── */
    .sidebar{background:var(--surface);border-right:1px solid var(--border);
      display:flex;flex-direction:column;overflow:hidden}
    .sidebar-head{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
    .logo{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:14px}
    .logo-dot{width:7px;height:7px;border-radius:50%;background:var(--accent2);
      box-shadow:0 0 6px var(--accent2);animation:blink 1.8s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
    .total-count{font-size:28px;font-weight:800;letter-spacing:-.04em;color:var(--accent)}
    .total-label{font-size:11px;color:var(--muted);margin-top:2px}

    .sidebar-section{padding:14px 16px 8px}
    .sec-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
      color:var(--muted);margin-bottom:10px}

    /* Model filters */
    .model-list{display:flex;flex-direction:column;gap:4px}
    .model-item{display:flex;align-items:center;gap:10px;padding:8px 10px;
      border-radius:9px;cursor:pointer;transition:background .15s;
      border:1px solid transparent}
    .model-item:hover{background:rgba(255,255,255,.04)}
    .model-item.active{background:rgba(124,110,240,.1);border-color:rgba(124,110,240,.2)}
    .model-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .model-name{font-size:13px;font-weight:500;flex:1}
    .model-cnt{font-size:11px;color:var(--muted);font-weight:600;
      background:rgba(255,255,255,.06);padding:1px 7px;border-radius:10px}

    /* Category filters */
    .cat-list{display:flex;flex-direction:column;gap:3px}
    .cat-item{display:flex;align-items:center;gap:9px;padding:7px 10px;
      border-radius:8px;cursor:pointer;transition:background .15s;font-size:12px}
    .cat-item:hover{background:rgba(255,255,255,.04)}
    .cat-item.active{background:rgba(124,110,240,.1)}
    .cat-icon{font-size:14px;width:20px;text-align:center}
    .cat-name{flex:1;color:var(--muted)}
    .cat-item.active .cat-name{color:var(--text)}
    .cat-cnt{font-size:10px;color:var(--muted)}

    .sidebar-footer{margin-top:auto;padding:16px;border-top:1px solid var(--border)}
    .btn-back{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);
      text-decoration:none;padding:8px 12px;border-radius:8px;
      border:1px solid var(--border);background:var(--surface2);transition:all .18s}
    .btn-back:hover{color:var(--text);border-color:var(--border2)}

    /* ── MAIN CONTENT ───────────────────────────────── */
    .main{display:flex;flex-direction:column;overflow:hidden}
    .main-head{padding:20px 24px;border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .main-title{font-size:17px;font-weight:700;letter-spacing:-.02em}
    .main-sub{font-size:12px;color:var(--muted);margin-top:2px}
    .search-row{display:flex;gap:10px;align-items:center}
    #search{background:var(--surface2);border:1px solid var(--border);
      border-radius:9px;padding:8px 13px;font-size:13px;color:var(--text);
      outline:none;width:220px;transition:border-color .2s}
    #search:focus{border-color:rgba(124,110,240,.5)}
    #search::placeholder{color:var(--muted)}

    /* Context Log button */
    .btn-ctx-log{background:rgba(93,224,197,.08);border:1px solid rgba(93,224,197,.2);
      border-radius:9px;color:#5de0c5;font-size:12px;font-weight:600;padding:8px 14px;
      cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
    .btn-ctx-log:hover{background:rgba(93,224,197,.14);border-color:rgba(93,224,197,.35)}

    /* Memory grid */
    .mem-grid{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:10px}
    .mem-card{background:var(--surface);border:1px solid var(--border);
      border-radius:var(--r);padding:14px 16px;transition:border-color .18s;
      animation:card-in .3s ease forwards;opacity:0;transform:translateY(6px)}
    @keyframes card-in{to{opacity:1;transform:translateY(0)}}
    .mem-card:hover{border-color:var(--border2)}
    .mem-card-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .cat-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;
      letter-spacing:.04em;text-transform:uppercase}
    .model-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;
      display:flex;align-items:center;gap:5px;margin-left:auto}
    .model-badge-dot{width:5px;height:5px;border-radius:50%}
    .mem-text{font-size:13px;color:var(--text);line-height:1.5;margin-bottom:10px}
    .mem-footer{display:flex;align-items:center;gap:12px}
    .mem-ts{font-size:10px;color:var(--muted)}
    .strength-bar{flex:1;height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
    .strength-fill{height:100%;border-radius:2px;transition:width .5s ease}
    .strength-label{font-size:10px;color:var(--muted)}
    .fact-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
    .fact-pill{font-size:10px;color:var(--muted);background:rgba(255,255,255,.05);
      border:1px solid var(--border);border-radius:20px;padding:2px 8px}

    .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
      flex:1;gap:10px;color:var(--muted)}
    .empty-icon{font-size:40px;opacity:.4}

    /* Category badge colours */
    .cat-Identity   {background:rgba(124,110,240,.15);color:#a89cf7}
    .cat-Preference {background:rgba(240,160,93,.12);color:#f0a05d}
    .cat-Work       {background:rgba(93,224,197,.12);color:#5de0c5}
    .cat-Project    {background:rgba(93,160,240,.12);color:#5da0f0}
    .cat-Relationship{background:rgba(240,93,154,.12);color:#f05d9a}
    .cat-Goal       {background:rgba(255,215,0,.1);color:#ffd700}
    .cat-Temporal   {background:rgba(200,200,255,.08);color:#c8c8ff}
    .cat-Context    {background:rgba(180,180,180,.1);color:#b0b0c8}
    .cat-General    {background:rgba(255,255,255,.06);color:var(--muted)}

    /* ── CONTEXT LOG MODAL ──────────────────────────── */
    .modal-overlay{position:fixed;inset:0;background:rgba(6,6,12,.85);
      backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:flex-start;
      justify-content:center;padding:40px 24px;overflow-y:auto}
    .modal-overlay.hidden{display:none}
    .modal-box{background:var(--surface);border:1px solid var(--border2);
      border-radius:18px;width:100%;max-width:740px;display:flex;flex-direction:column;
      overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.6)}
    .modal-head{padding:20px 24px;border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .modal-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:10px}
    .modal-close{background:rgba(255,255,255,.06);border:1px solid var(--border);
      border-radius:8px;color:var(--muted);font-size:18px;line-height:1;
      padding:6px 10px;cursor:pointer;transition:all .18s}
    .modal-close:hover{color:var(--text);border-color:var(--border2)}
    .ctx-log{padding:16px;display:flex;flex-direction:column;gap:8px;
      max-height:calc(100vh - 200px);overflow-y:auto}
    .ctx-entry{background:var(--surface2);border:1px solid var(--border);
      border-radius:10px;padding:12px 14px}
    .ctx-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .ctx-model{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
    .ctx-ts{font-size:10px;color:var(--muted);margin-left:auto}
    .ctx-query{font-size:11px;color:var(--muted);margin-bottom:8px;
      background:rgba(255,255,255,.03);padding:6px 8px;border-radius:6px;
      border-left:2px solid var(--accent)}
    .ctx-mems{display:flex;flex-direction:column;gap:4px}
    .ctx-mem{font-size:10px;color:var(--muted);display:flex;gap:6px;align-items:flex-start}
    .ctx-dot{width:4px;height:4px;border-radius:50%;background:var(--accent2);
      flex-shrink:0;margin-top:3px}
    .ctx-empty{font-size:11px;color:var(--muted);font-style:italic;padding:4px 8px}
  </style>
</head>
<body>
<div class="layout">

  <!-- ── LEFT SIDEBAR ──────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-head">
      <div class="logo"><div class="logo-dot"></div>CLS++ Memory</div>
      <div class="total-count" id="total-count">0</div>
      <div class="total-label">memories stored</div>
    </div>

    <div class="sidebar-section">
      <div class="sec-label">By AI Model</div>
      <div class="model-list" id="model-list">
        <div class="model-item active" data-model="">
          <div class="model-dot" style="background:var(--text)"></div>
          <span class="model-name">All Models</span>
          <span class="model-cnt" id="cnt-all">0</span>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sec-label">By Category</div>
      <div class="cat-list" id="cat-list">
        <div class="cat-item active" data-cat="">
          <span class="cat-icon">🗂️</span>
          <span class="cat-name">All Categories</span>
          <span class="cat-cnt" id="cnt-cat-all">0</span>
        </div>
      </div>
    </div>

    <div class="sidebar-footer">
      <a href="index.html" class="btn-back">← Back to launcher</a>
    </div>
  </aside>

  <!-- ── MAIN: MEMORY CARDS ─────────────────────────── -->
  <main class="main">
    <div class="main-head">
      <div>
        <div class="main-title" id="main-title">All Memories</div>
        <div class="main-sub" id="main-sub">Loading…</div>
      </div>
      <div class="search-row">
        <input id="search" type="text" placeholder="Search memories…" autocomplete="off"/>
        <button class="btn-ctx-log" id="btn-ctx-log">
          <span style="width:6px;height:6px;border-radius:50%;background:#5de0c5;box-shadow:0 0 6px #5de0c5;display:inline-block;animation:blink 1.8s ease-in-out infinite"></span>
          Context Log
        </button>
        <a href="index.html" style="display:flex;align-items:center;gap:7px;font-size:11px;font-weight:600;color:#5de0c5;text-decoration:none;background:rgba(93,224,197,.08);border:1px solid rgba(93,224,197,.2);padding:6px 12px;border-radius:20px;">
          <span style="width:6px;height:6px;border-radius:50%;background:#5de0c5;box-shadow:0 0 6px #5de0c5;display:inline-block;animation:blink 1.8s ease-in-out infinite"></span>
          Memory Active
        </a>
      </div>
    </div>
    <div class="mem-grid" id="mem-grid">
      <div class="empty">
        <div class="empty-icon">🧠</div>
        <div>No memories yet. Start a chat →</div>
      </div>
    </div>
  </main>

</div>

<!-- ── CONTEXT LOG MODAL ──────────────────────────────── -->
<div class="modal-overlay hidden" id="ctx-modal">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title">
        <span style="width:7px;height:7px;border-radius:50%;background:#5de0c5;box-shadow:0 0 6px #5de0c5;display:inline-block"></span>
        Context Log — memories sent to each AI
      </div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="ctx-log" id="ctx-log"></div>
  </div>
</div>

<script>
const API = 'http://localhost:8080';

// ── Device identity ────────────────────────────────────
const UID = localStorage.getItem('clspp_uid') || 'demo';

// ── State ──────────────────────────────────────────────
let allMemories = [];
let activeModel = '';
let activeCat   = '';

// ── Category meta ──────────────────────────────────────
const CAT_META = {
  'Identity':     {icon:'👤', color:'#a89cf7'},
  'Preference':   {icon:'❤️', color:'#f0a05d'},
  'Work':         {icon:'💼', color:'#5de0c5'},
  'Project':      {icon:'🚀', color:'#5da0f0'},
  'Relationship': {icon:'👥', color:'#f05d9a'},
  'Goal':         {icon:'🎯', color:'#ffd700'},
  'Temporal':     {icon:'⏱️', color:'#c8c8ff'},
  'Context':      {icon:'📌', color:'#b0b0c8'},
  'General':      {icon:'💬', color:'#888'},
};

// ── Model meta ─────────────────────────────────────────
const MODEL_META = {
  'claude-haiku-4-5': {label:'Claude Haiku', color:'var(--claude)'},
  'claude':           {label:'Claude',       color:'var(--claude)'},
  'gpt-4o-mini':      {label:'GPT-4o mini',  color:'var(--chatgpt)'},
  'gpt-4o':           {label:'GPT-4o',       color:'var(--chatgpt)'},
  'openai':           {label:'OpenAI',       color:'var(--chatgpt)'},
  'gemini':           {label:'Gemini',       color:'var(--gemini)'},
  'copilot':          {label:'Copilot',      color:'var(--copilot)'},
  'perplexity':       {label:'Perplexity',   color:'var(--perplexity)'},
  'grok':             {label:'Grok',         color:'var(--grok)'},
};

function modelMeta(m) {
  if (MODEL_META[m]) return MODEL_META[m];
  // fuzzy match
  for (const [k,v] of Object.entries(MODEL_META)) {
    if (m.toLowerCase().includes(k)) return v;
  }
  return {label: m, color: 'var(--muted)'};
}

// ── Fetch + render ─────────────────────────────────────
async function loadMemories() {
  try {
    let url = `${API}/api/memories/${UID}`;
    const params = [];
    if (activeModel) params.push('model=' + encodeURIComponent(activeModel));
    if (activeCat)   params.push('category=' + encodeURIComponent(activeCat));
    if (params.length) url += '?' + params.join('&');

    const r = await fetch(url);
    const d = await r.json();
    allMemories = d.memories || [];
    renderMemories();
    buildSidebar(d);
  } catch(e) {
    console.error(e);
  }
}

function renderMemories() {
  const q = document.getElementById('search').value.toLowerCase();
  const mems = q
    ? allMemories.filter(m => m.text.toLowerCase().includes(q))
    : allMemories;

  const grid = document.getElementById('mem-grid');
  if (!mems.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🧠</div><div>No memories yet. Start chatting →</div></div>`;
    return;
  }

  document.getElementById('main-sub').textContent =
    `${mems.length} memor${mems.length===1?'y':'ies'}${activeModel?' · '+modelMeta(activeModel).label:''}${activeCat?' · '+activeCat:''}`;

  grid.innerHTML = '';
  mems.forEach((m, i) => {
    const mm   = modelMeta(m.source_model);
    const cm   = CAT_META[m.category] || CAT_META['General'];
    const pct  = Math.round(m.strength * 100);
    const ts   = new Date(m.ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    const date = new Date(m.ts).toLocaleDateString([], {month:'short',day:'numeric'});

    const card = document.createElement('div');
    card.className = 'mem-card';
    card.style.animationDelay = (i * 0.04) + 's';
    card.innerHTML = `
      <div class="mem-card-head">
        <span class="cat-badge cat-${m.category}">${cm.icon} ${m.category}</span>
        <span style="font-size:10px;color:var(--muted)">${m.source==='user'?'you said':'AI said'}</span>
        <span class="model-badge" style="background:${mm.color}18;border:1px solid ${mm.color}33;color:${mm.color}">
          <span class="model-badge-dot" style="background:${mm.color}"></span>${mm.label}
        </span>
      </div>
      <div class="mem-text">${esc(m.text)}</div>
      <div class="fact-pills">
        ${m.subject?`<span class="fact-pill">subj: ${esc(m.subject)}</span>`:''}
        ${m.relation?`<span class="fact-pill">rel: ${esc(m.relation)}</span>`:''}
        ${m.value?`<span class="fact-pill">val: ${esc(m.value)}</span>`:''}
      </div>
      <div class="mem-footer">
        <span class="mem-ts">${date} ${ts}</span>
        <div class="strength-bar" title="Memory strength: ${pct}%">
          <div class="strength-fill" style="width:${pct}%;background:${mm.color}"></div>
        </div>
        <span class="strength-label">${pct}%</span>
      </div>`;
    grid.appendChild(card);
  });
}

function buildSidebar(d) {
  // Total count
  document.getElementById('total-count').textContent = d.count;
  document.getElementById('cnt-all').textContent = d.count;
  document.getElementById('cnt-cat-all').textContent = d.count;

  // Model list
  const ml = document.getElementById('model-list');
  // Keep "All" item, rebuild rest
  const allItem = ml.querySelector('[data-model=""]');
  ml.innerHTML = '';
  ml.appendChild(allItem);

  (d.available_models || []).forEach(m => {
    const mm  = modelMeta(m);
    const cnt = allMemories.filter(x => x.source_model === m).length;
    const el  = document.createElement('div');
    el.className = 'model-item' + (activeModel === m ? ' active' : '');
    el.dataset.model = m;
    el.innerHTML = `
      <div class="model-dot" style="background:${mm.color};box-shadow:0 0 5px ${mm.color}"></div>
      <span class="model-name">${mm.label}</span>
      <span class="model-cnt">${cnt}</span>`;
    el.addEventListener('click', () => { activeModel = m; refreshFilters(); });
    ml.appendChild(el);
  });

  // Category list
  const cl = document.getElementById('cat-list');
  const allCatItem = cl.querySelector('[data-cat=""]');
  cl.innerHTML = '';
  cl.appendChild(allCatItem);

  (d.available_categories || []).forEach(cat => {
    const cm  = CAT_META[cat] || CAT_META['General'];
    const cnt = allMemories.filter(x => x.category === cat).length;
    const el  = document.createElement('div');
    el.className = 'cat-item' + (activeCat === cat ? ' active' : '');
    el.dataset.cat = cat;
    el.innerHTML = `
      <span class="cat-icon">${cm.icon}</span>
      <span class="cat-name">${cat}</span>
      <span class="cat-cnt">${cnt}</span>`;
    el.addEventListener('click', () => { activeCat = cat; refreshFilters(); });
    cl.appendChild(el);
  });
}

function refreshFilters() {
  document.querySelectorAll('.model-item').forEach(el =>
    el.classList.toggle('active', el.dataset.model === activeModel));
  document.querySelectorAll('.cat-item').forEach(el =>
    el.classList.toggle('active', el.dataset.cat === activeCat));
  document.getElementById('main-title').textContent =
    (activeModel ? modelMeta(activeModel).label : 'All') + ' · ' +
    (activeCat   || 'All Categories');
  loadMemories();
}

// "All" sidebar items
document.querySelector('.model-item[data-model=""]').addEventListener('click', () => {
  activeModel = ''; refreshFilters();
});
document.querySelector('.cat-item[data-cat=""]').addEventListener('click', () => {
  activeCat = ''; refreshFilters();
});

// Search
document.getElementById('search').addEventListener('input', renderMemories);

// ── Context log ────────────────────────────────────────
async function loadContextLog() {
  try {
    const r = await fetch(`${API}/api/context-log/${UID}`);
    const d = await r.json();
    const log = d.log || [];
    const el = document.getElementById('ctx-log');
    if (!log.length) {
      el.innerHTML = `<div style="font-size:12px;color:var(--muted);padding:20px;text-align:center">
        No context bridges yet. Send a chat message to see what memory is sent to each AI.</div>`;
      return;
    }
    el.innerHTML = '';
    log.forEach(entry => {
      const mm = modelMeta(entry.model);
      const ts = new Date(entry.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      const div = document.createElement('div');
      div.className = 'ctx-entry';
      div.innerHTML = `
        <div class="ctx-head">
          <div class="model-dot" style="background:${mm.color};width:8px;height:8px;border-radius:50%"></div>
          <span class="ctx-model" style="color:${mm.color}">${mm.label}</span>
          <span style="font-size:10px;background:${mm.color}18;color:${mm.color};padding:2px 7px;
            border-radius:10px">${entry.count} memor${entry.count===1?'y':'ies'} injected</span>
          <span class="ctx-ts">${ts}</span>
        </div>
        <div class="ctx-query">You: "${esc(entry.query)}"</div>
        <div class="ctx-mems">
          ${entry.memories_sent.length
            ? entry.memories_sent.map(m =>
                `<div class="ctx-mem"><div class="ctx-dot"></div><span>${esc(m.slice(0,100))}</span></div>`
              ).join('')
            : '<div class="ctx-empty">No memories yet for this request</div>'
          }
        </div>`;
      el.appendChild(div);
    });
  } catch(e) {}
}

// ── Context Log modal ──────────────────────────────────
document.getElementById('btn-ctx-log').addEventListener('click', async () => {
  await loadContextLog();
  document.getElementById('ctx-modal').classList.remove('hidden');
});

document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('ctx-modal').classList.add('hidden');
});

document.getElementById('ctx-modal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('ctx-modal')) {
    document.getElementById('ctx-modal').classList.add('hidden');
  }
});

// ── WebSocket: live memory push ─────────────────────────
function connectWS() {
  try {
    const ws = new WebSocket(`ws://localhost:8080/ws/memories/${UID}`);
    ws.onmessage = async () => { await loadMemories(); };
    ws.onclose = () => setTimeout(connectWS, 3000);
  } catch(_) {}
}

// ── Helpers ────────────────────────────────────────────
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Boot ───────────────────────────────────────────────
loadMemories();
connectWS();
setInterval(loadMemories, 8000); // poll fallback
</script>
