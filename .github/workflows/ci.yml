name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: clsplusplus
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        env:
          CLS_REDIS_URL: redis://localhost:6379/0
          CLS_DATABASE_URL: postgresql://postgres:test@localhost:5432/clsplusplus
          CLS_MINIO_ENDPOINT: ""
          CLS_MINIO_ACCESS_KEY: ""
          CLS_MINIO_SECRET_KEY: ""
          CLS_MINIO_BUCKET: ""
          CLS_REQUIRE_API_KEY: "false"
        run: pytest tests/ -v --tb=short

  extension-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate manifest.json
        run: |
          node -e '
            const m = require("./extension/manifest.json");
            if (m.manifest_version !== 3) {
              console.error("manifest_version must be 3, got " + m.manifest_version);
              process.exit(1);
            }
            if (!m.version) { console.error("manifest.json missing version"); process.exit(1); }
            console.log("manifest.json OK — v" + m.version + ", manifest_version 3");
          '

      - name: Syntax-check extension JS
        run: |
          for f in extension/*.js; do
            echo "checking $f"
            node --check "$f"
          done
